<div class="container">

<!-- ADD INTEL CARD -->
<div class="card">

<h2>Add Intel</h2>

<input id="title" placeholder="Title">

<input id="source" placeholder="Source">

<label>Date Heard</label>
<input id="dateHeard" type="date">

<textarea id="intelText" placeholder="Write intel details..."></textarea>

<label>Confidence</label>
<input id="confidence" type="range" min="0" max="10" value="5">

<select id="status">
<option value="Unverified">Unverified</option>
<option value="Confirmed">Confirmed</option>
<option value="False">False</option>
</select>

<button onclick="addIntel()">
Add Intel
</button>

</div>



<!-- INTEL LIST CARD -->
<div class="card">

<h2>Intel List</h2>

<table class="intelTable">

<thead>

<tr>
<th>Title</th>
<th>Source</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="intelList">

<!-- INTEL LOADS HERE -->

</tbody>

</table>
